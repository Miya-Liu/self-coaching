name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doctor:
    name: doctor.sh (lint + structure + content)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doctor.sh
        run: bash scripts/doctor.sh

      - name: T1 skill pack install smoke
        run: bash scripts/install-skill-pack.sh . --with-mock

  shellcheck:
    name: shellcheck (all .sh files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shellcheck
        run: |
          # SC1091 = "can't follow non-constant source" (sourcing .env at runtime is fine)
          # SC2155 = "declare and assign separately" (style only)
          # Recurse over every .sh we ship; ignore the vendored superpowers-skills clone.
          mapfile -d '' files < <(find scripts modes/self-coaching/self-tuning/pipelines -type f -name '*.sh' -print0)
          shellcheck --exclude=SC1091,SC2155 --severity=warning "${files[@]}"

  python-checks:
    name: Python compile, contract sync, orchestrator smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check mock service
        run: |
          python -m py_compile mock-services/mock_self_coaching.py
          python -m py_compile mock-services/mock_agent_registry.py
          python -m py_compile mock-services/mock_agentevals.py
          python -m py_compile mock-services/mock_self_learning.py
          python -m py_compile mock-services/mock_self_play.py
          python -m py_compile mock-services/mock_aerl.py
          python -m py_compile mock-services/plugin_mock.py
          python -m py_compile services/adapters/aerl_client.py
          python -m py_compile services/adapters/train_adapter.py

      - name: Mock AgentEvals Phase 0 smoke
        run: bash scripts/mock-agentevals-smoke.sh

      - name: Mock self-learning Phase 1 smoke
        run: bash scripts/mock-self-learning-smoke.sh

      - name: Mock self-play Phase 2 smoke
        run: bash scripts/mock-self-play-smoke.sh

      - name: Mock AERL Phase 3 smoke
        run: bash scripts/mock-aerl-smoke.sh

      - name: Assert OpenAPI and compact contract stay in sync
        run: python mock-services/contracts/regenerate.py --check

      - name: Orchestrator M1 smoke (module transport)
        run: |
          python -m services.orchestrator record-eval \
            --coaching-root mock-services/ci-orchestrator-root \
            --agent-id ci-agent \
            --baseline-score 0.95
          RUN_DIR=runs/ci-orchestrator-smoke
          python -m services.orchestrator run \
            --coaching-root mock-services/ci-orchestrator-root \
            --run-dir "$RUN_DIR" \
            --agent-id ci-agent \
            --force-trigger
          test -f "$RUN_DIR/decision.json"
          test -f "$RUN_DIR/deploy_manifest.json"

  integration-mock-stack:
    name: integration mock stack (coach demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Coach demo — two agents, drop loop, promote/reject
        run: bash scripts/mock-coach-demo.sh

  mock-smoke:
    name: mock pipeline smoke test (run-all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run end-to-end mock pipeline
        run: |
          python mock-services/mock_self_coaching.py run-all \
            --root mock-services/ci-smoke-run \
            --capability tool_use \
            --pipeline sft

      - name: Verify expected artifacts exist
        run: |
          set -e
          for f in \
            mock-services/ci-smoke-run/experience/EXPERIMENT_LOG.md \
            mock-services/ci-smoke-run/.self-coaching/events/learning_events.jsonl \
            mock-services/ci-smoke-run/.self-coaching/cases/self_play_candidates.jsonl \
            mock-services/ci-smoke-run/.self-coaching/cases/eval_cases.jsonl \
            mock-services/ci-smoke-run/.self-coaching/curated/train.jsonl \
            mock-services/ci-smoke-run/.self-coaching/manifests/training_run_manifest.json \
            mock-services/ci-smoke-run/.self-coaching/manifests/mock_pipeline_summary.json
          do
            if [[ ! -f "$f" ]]; then
              echo "MISSING expected artifact: $f" >&2
              exit 1
            fi
            echo "ok: $f"
          done

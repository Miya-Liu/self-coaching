openapi: 3.0.3
info:
  title: Self-Coaching Service Contract
  version: 1.0.0
  description: |
    HTTP contract for the self-coaching learning → self-play → evaluation → training
    pipeline. Any real implementation (LLM service, trainer, evaluator) MUST satisfy
    this contract to drop into the skill without code changes.

    The deterministic stdlib-only reference implementation lives at
    `mock-services/mock_self_coaching.py serve`.

    Versioning: this file is the source of truth. The compact JSON form at
    `contracts/mock_service_contract.json` is generated from this file and MUST
    stay in sync (CI enforces).
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://127.0.0.1:8765
    description: Default local mock service
  - url: http://localhost:{port}
    description: Local development
    variables:
      port:
        default: "8765"

tags:
  - name: health
    description: Liveness / readiness probes
  - name: learning
    description: Capture an agent learning event
  - name: self-play
    description: Generate self-play training candidates
  - name: evaluation
    description: Run an evaluation suite against a candidate
  - name: training
    description: Launch a training pipeline
  - name: pipeline
    description: End-to-end pipeline orchestration

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: health
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /learning/events:
    post:
      tags: [learning]
      summary: Record a learning event
      description: |
        Capture an agent learning event (correction, mistake, preference update).
        The service appends it to its learning-events log and may seed self-play.
      operationId: createLearningEvent
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningEventRequest"
      responses:
        "200":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningEventRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"

  /learning/evolve:
    post:
      tags: [learning]
      summary: Targeted session review (production learner)
      description: |
        Review specified sessions via the independent review agent. Sync when
        `wait=true` (200); async when `wait=false` (202 + job_id). Mock
        implementation: `mock_self_learning.py serve` on port 8766.
      operationId: evolveLearningSessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningEvolveRequest"
      responses:
        "200":
          description: Review completed (sync)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningEvolveCompleted"
        "202":
          description: Review queued (async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningEvolveQueued"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /learning/evolve/recent:
    post:
      tags: [learning]
      summary: Auto-learn trailing window (production learner)
      operationId: evolveLearningRecent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningEvolveRecentRequest"
      responses:
        "200":
          description: Review completed (sync)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningEvolveCompleted"
        "202":
          description: Review queued (async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningEvolveQueued"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /learning/status/{job_id}:
    get:
      tags: [learning]
      summary: Poll async review job
      operationId: getLearningJobStatus
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningJobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /learn/sessions:
    get:
      tags: [learning]
      summary: Discover candidate sessions for review
      operationId: listLearnSessions
      parameters:
        - in: query
          name: hours
          schema:
            type: number
            default: 24
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: include_optout
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnSessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /learning/optout:
    post:
      tags: [learning]
      summary: Per-session learn opt-out
      operationId: setLearningOptout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningOptoutRequest"
      responses:
        "200":
          description: Opt-out updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningOptoutResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /learning/health:
    get:
      tags: [learning]
      summary: Learner readiness probe
      operationId: learningHealth
      security: []
      responses:
        "200":
          description: Learner is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningHealthResponse"

  /self-play/generate:
    post:
      tags: [self-play]
      summary: Generate self-play candidate cases
      operationId: generateSelfPlay
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelfPlayRequest"
      responses:
        "200":
          description: Cases generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfPlayResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"

  /eval/runs:
    post:
      tags: [evaluation]
      summary: Run an evaluation against curated eval cases
      operationId: createEvalRun
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRequest"
      responses:
        "200":
          description: Evaluation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"

  /eval/runs/{run_id}/report:
    get:
      tags: [evaluation]
      summary: Fetch the full report for a completed eval run
      operationId: getEvalReport
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
          description: Run identifier returned by POST /eval/runs
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalReport"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /training/runs:
    post:
      tags: [training]
      summary: Launch a training pipeline
      operationId: createTrainingRun
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingRequest"
      responses:
        "200":
          description: Training completed (mock) or accepted (real, async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingResponse"
        "400":
          description: Unsupported pipeline id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"

  /pipeline/run-all:
    post:
      tags: [pipeline]
      summary: Run the full learn → self-play → evaluate → train → re-evaluate loop
      description: |
        Orchestrates the entire pipeline end-to-end. Returns a summary that wires
        the candidate eval result back into the training manifest's `eval_run_id`.
      operationId: runFullPipeline
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAllRequest"
      responses:
        "200":
          description: Pipeline completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAllResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token. Set `MOCK_SERVICE_TOKEN` on the server and pass the same
        value as `Authorization: Bearer <token>` from clients. When the env var
        is unset, auth is disabled (local mock default).

  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
      description: |
        Optional idempotency key. When provided on POST mutating endpoints, the
        server returns the prior response for the same (endpoint, key) within
        ~24 hours instead of re-executing the operation.

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal service error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PayloadTooLarge:
      description: Request body exceeds server limit
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          description: Service implementation version
        root:
          type: string
          description: Absolute path to the demo/work root (mock only)

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
        type:
          type: string
          description: Exception class name or error code

    Capability:
      type: string
      description: Agent capability tag
      example: tool_use

    # ---- learning ----
    LearningEventRequest:
      type: object
      required: [event]
      properties:
        event:
          type: string
          description: Short description of what the agent learned/missed
          maxLength: 1024
        source:
          type: string
          default: http
          description: Origin tag (e.g. "http", "cli", "manual", "ci")
        capability:
          $ref: "#/components/schemas/Capability"

    LearningEventRecord:
      type: object
      required: [id, timestamp, event, capability, source, privacy_checked]
      properties:
        id:
          type: string
          description: Stable content-hash identifier
        timestamp:
          type: string
          format: date-time
        source:
          type: string
        capability:
          type: array
          items: { $ref: "#/components/schemas/Capability" }
        event:
          type: string
        classification:
          type: string
          enum: [eval_case_candidate, training_candidate, skill_patch_candidate, none]
        privacy_checked:
          type: boolean
        durable_artifact:
          type: string
        notes:
          type: string

    LearningEvolveRequest:
      type: object
      required: [session_ids]
      properties:
        session_ids:
          type: array
          items: { type: string }
        evolve_memory: { type: boolean, default: true }
        evolve_skills: { type: boolean, default: true }
        dry_run: { type: boolean, default: false }
        wait:
          type: boolean
          description: "true = sync (200); false = async (202). Auto when omitted."
        coaching_root:
          type: string
          description: Mock-only coaching root for artifact writes
        agent_id:
          type: string
          default: example-agent

    LearningEvolveRecentRequest:
      type: object
      properties:
        hours: { type: number, default: 24 }
        max_sessions: { type: integer, default: 10 }
        evolve_memory: { type: boolean, default: true }
        evolve_skills: { type: boolean, default: true }
        dry_run: { type: boolean, default: false }
        wait: { type: boolean }
        coaching_root: { type: string }
        agent_id: { type: string, default: example-agent }

    LearningEvolveCompleted:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [completed]
        duration_ms: { type: integer }
        results:
          type: array
          items:
            $ref: "#/components/schemas/LearningSessionResult"
        window:
          type: object
        sessions_found: { type: integer }
        sessions_reviewed: { type: integer }
        sessions_skipped:
          type: array
          items:
            type: object

    LearningEvolveQueued:
      type: object
      required: [status, job_id]
      properties:
        status:
          type: string
          enum: [queued]
        job_id: { type: string }
        session_count: { type: integer }
        poll_url:
          type: string
          description: "Canonical /learning/status/{job_id}; client normalizes legacy /learn/status/"

    LearningSessionResult:
      type: object
      required: [session_id, status]
      properties:
        session_id: { type: string }
        status:
          type: string
          enum: [ok, skipped]
        reason: { type: string }
        actions:
          type: object
        draft_version_id: { type: string }
        fork_iterations: { type: integer }
        tokens:
          type: object

    LearningJobStatus:
      type: object
      required: [status, job_id]
      properties:
        status:
          type: string
          enum: [running, completed, queued]
        job_id: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        duration_ms: { type: integer }
        progress:
          type: object
        results:
          type: array
          items:
            $ref: "#/components/schemas/LearningSessionResult"

    LearnSessionsResponse:
      type: object
      required: [sessions]
      properties:
        window:
          type: object
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/LearnSessionSummary"

    LearnSessionSummary:
      type: object
      required: [session_id, last_active, learn_optout]
      properties:
        session_id: { type: string }
        title: { type: string }
        last_active: { type: string, format: date-time }
        message_count: { type: integer }
        platform: { type: string }
        learn_optout: { type: boolean }

    LearningOptoutRequest:
      type: object
      required: [session_id]
      properties:
        session_id: { type: string }
        optout: { type: boolean, default: true }

    LearningOptoutResponse:
      type: object
      required: [session_id, optout, updated_at]
      properties:
        session_id: { type: string }
        optout: { type: boolean }
        updated_at: { type: string, format: date-time }

    LearningHealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version: { type: string }
        data_dir: { type: string }

    # ---- self-play ----
    SelfPlayRequest:
      type: object
      properties:
        capability:
          $ref: "#/components/schemas/Capability"
        n:
          type: integer
          minimum: 1
          maximum: 1000
          default: 3
          description: Number of candidate cases to generate

    SelfPlayResponse:
      type: object
      required: [status, count, case_ids]
      properties:
        status:
          type: string
          enum: [generated]
        count:
          type: integer
        case_ids:
          type: array
          items: { type: string }

    # ---- evaluation ----
    EvalRequest:
      type: object
      properties:
        candidate:
          type: string
          default: mock-candidate-v1
          description: Identifier of the candidate model/agent/config under test
        baseline:
          type: string
          default: mock-baseline-v0
          description: Identifier of the baseline to compare against

    EvalSummary:
      type: object
      required: [status, run_id, report, recommendation]
      properties:
        status:
          type: string
          enum: [passed, failed]
        run_id:
          type: string
        report:
          type: string
          description: Path to the full JSON report
        recommendation:
          type: string
          enum: [promote, do_not_promote]

    EvalReport:
      type: object
      required: [run_id, candidate, baseline, status, scores, case_count, recommendation]
      properties:
        run_id: { type: string }
        timestamp: { type: string, format: date-time }
        candidate: { type: string }
        baseline: { type: string }
        status:
          type: string
          enum: [passed, failed]
        scores:
          type: object
          required: [overall]
          properties:
            overall: { type: number, minimum: 0, maximum: 1 }
            tool_use: { type: number, minimum: 0, maximum: 1 }
            safety: { type: number, minimum: 0, maximum: 1 }
            privacy: { type: number, minimum: 0, maximum: 1 }
          additionalProperties:
            type: number
        case_count: { type: integer }
        results:
          type: array
          items:
            type: object
            properties:
              case_id: { type: string }
              passed: { type: boolean }
              score: { type: number }
              failures:
                type: array
                items: { type: string }
              route: { type: string }
        regressions:
          type: array
          items: { type: object }
        top_failures:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              case_id: { type: string }
              reason: { type: string }
              route: { type: string }
        recommendation:
          type: string
          enum: [promote, do_not_promote]
        cost:
          type: object
          properties:
            tokens: { type: integer }
            usd: { type: number }
        latency:
          type: object
          properties:
            p50_s: { type: number }
            p95_s: { type: number }

    # ---- training ----
    TrainingRequest:
      type: object
      properties:
        pipeline:
          type: string
          enum: [sft, grpo]
          default: sft
        dataset:
          type: string
          nullable: true
          description: Path to a JSONL dataset; defaults to the curated train split
        base_model:
          type: string
          default: mock-base
        agent_id:
          type: string
          nullable: true
          description: Subject agent for registry lineage (defaults from env AGENT_ID)
        agent_snapshot:
          type: object
          nullable: true
          description: |
            Optional pin of non-model agent state at train start (registry version,
            memory/skill/prompt bundles, eval_run_id). Passed through to trainer
            `POST /v1/training/runs` when ORCHESTRATOR_TRAIN_BACKEND=aerl.
          additionalProperties: true
          properties:
            registry_version_id: { type: string }
            memory_version: { type: string }
            skill_bundle_version: { type: string }
            prompt_bundle_version: { type: string }
            eval_run_id: { type: string }
            learning_job_id: { type: string }
        rollout_config_ref:
          type: string
          nullable: true
          description: |
            Path to a JSON rollout profile or registered config id. Required for
            `grpo` on the trainer backend; maps to trainer `rollout` / `config_ref`.
        reward_spec_ref:
          type: string
          nullable: true
          description: |
            Path to a JSON `reward_spec` (schema_version reward.ic.v1) or inline
            object ref for trainer validation before queueing.

    TrainingResponse:
      type: object
      required: [status, run_id, candidate, manifest, log_file]
      properties:
        status:
          type: string
          enum: [trained, accepted]
          description: "`trained` = synchronous (mock); `accepted` = async (real service)"
        run_id:
          type: string
        candidate:
          type: string
          description: Identifier of the resulting model/agent
        manifest:
          type: string
          description: Path to the training manifest JSON
        log_file:
          type: string
          description: Path to the training log file (stdout/stderr captured here)

    # ---- run-all ----
    RunAllRequest:
      type: object
      properties:
        capability:
          $ref: "#/components/schemas/Capability"
        pipeline:
          type: string
          enum: [sft, grpo]
          default: sft

    RunAllResponse:
      type: object
      required: [status, root, learning_event_id, self_play, baseline_eval, training, candidate_eval, promotion_allowed]
      properties:
        status:
          type: string
          enum: [ok]
        root:
          type: string
        init:
          type: object
        learning_event_id:
          type: string
        self_play:
          $ref: "#/components/schemas/SelfPlayResponse"
        baseline_eval:
          $ref: "#/components/schemas/EvalSummary"
        training:
          $ref: "#/components/schemas/TrainingResponse"
        candidate_eval:
          $ref: "#/components/schemas/EvalSummary"
        promotion_allowed:
          type: boolean
          description: True iff candidate_eval.recommendation == "promote"

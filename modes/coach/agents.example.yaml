# Coach mode supervision registry (M5) — copy to agents.yaml and edit.
# See docs/design/coach_mode.md and modes/coach/registry.py

agents:
  - id: example-agent
    coaching_root: /var/lib/coach/agents/example-agent
    model: gpt-example
    prefer_skill_first: true
    eval:
      suite_id_canary: tool-use-canary
      suite_id_holdout: tool-use-holdout
      interval: "0 2 * * *"
    improvement:
      train_pipeline: sft
      min_cases_for_model_path: 100
    coach_clock:
      enabled: true
      scenario: scenarios/clock_loop.json
      # agent_chat_url: https://agent.example.com/v1/chat  # production: real agent decides route

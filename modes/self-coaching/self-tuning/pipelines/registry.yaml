# Index of training pipelines (AERL). Layout: registry.yaml, _lib.sh, */pipeline.yaml, */run.sh
# HTTP contract (default): POST {TRAINER_BASE_URL}/v1/pipelines/{id}/run
#   JSON body: {"argv": ["scheduler.type=local", ...]} — trainer streams/logs in response body.
# Local fallback: PIPELINE_MODE=local, AERL_ROOT → see modes/self-coaching/self-tuning/pipelines/_lib.sh and */run.sh
version: 1
# Trainer HTTP base URL. Override at runtime with TRAINER_BASE_URL in
# modes/self-coaching/self-tuning/services/.env (see example.env). _lib.sh defaults
# to http://localhost:8004 when unset.
service:
  name: AERL
  url: http://localhost:8004
pipelines:
  - id: sft
    path: modes/self-coaching/self-tuning/pipelines/sft
    trainer: SFT
    description: Supervised fine-tuning (offline supervision / instruction data).
  - id: grpo
    path: modes/self-coaching/self-tuning/pipelines/grpo
    trainer: GRPO
    description: Group relative policy optimization (RL) via AERL async trainer.
